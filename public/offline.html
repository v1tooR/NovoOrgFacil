<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Sem conexão | Fácil Organização</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #0a0a0a;
        background-color: #f7f7f7;
        background-image: linear-gradient(rgb(10 10 10 / 3%) 1px, transparent 1px), linear-gradient(90deg, rgb(10 10 10 / 3%) 1px, transparent 1px);
        background-size: 32px 32px;
        font-family: "Courier New", ui-monospace, monospace;
      }
      main {
        width: min(100%, 520px);
        border: 1px solid #0a0a0a;
        background: #fff;
        box-shadow: 8px 8px 0 rgb(10 10 10 / 10%);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        color: #fff;
        background: #0a0a0a;
      }
      header img { width: 32px; height: 32px; }
      header span { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; }
      section { padding: 32px 28px; }
      .eyebrow { margin: 0 0 16px; color: #666; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(28px, 7vw, 42px); line-height: 1; letter-spacing: -.06em; }
      p { margin: 18px 0 28px; color: #5f5f5f; font-size: 13px; line-height: 1.7; }
      button {
        width: 100%;
        min-height: 48px;
        border: 1px solid #0a0a0a;
        color: #fff;
        background: #0a0a0a;
        font: 600 11px "Courier New", ui-monospace, monospace;
        letter-spacing: .16em;
        text-transform: uppercase;
        cursor: pointer;
      }
      button:hover, button:focus-visible { color: #0a0a0a; background: #fff; outline: 2px solid #0a0a0a; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="/icons/icon-192.png" alt="" />
        <span>Fácil Organização</span>
      </header>
      <section>
        <p class="eyebrow">Status / Offline</p>
        <h1>Você está sem conexão.</h1>
        <p>Não foi possível acessar o servidor agora. Seus dados continuam protegidos e não foram armazenados neste dispositivo.</p>
        <button type="button" onclick="window.location.reload()">Tentar novamente</button>
      </section>
    </main>
  </body>
</html>
